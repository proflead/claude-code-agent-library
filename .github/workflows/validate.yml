name: Validate Agents

on:
push:
  branches: [ main ]
pull_request:
  branches: [ main ]
workflow_dispatch:

jobs:
validate:
  runs-on: ubuntu-latest
    
  steps:
  - uses: actions/checkout@v4
    
  - name: Validate agent files
    run: |
      chmod +x scripts/validate-agents.sh
      ./scripts/validate-agents.sh
    
  - name: Check documentation
    run: |
      REQUIRED_DOCS="README.md CONTRIBUTING.md LICENSE TESTING.md CODE_OF_CONDUCT.md"
      for doc in $REQUIRED_DOCS; do
        if [ ! -f "$doc" ]; then
          echo " Missing required file: $doc"
          exit 1
        fi
      done
      echo " All required documentation present"

  - name: Check for legacy platform references
    run: |
      if grep -RInE "Co[p]ilot|co[p]ilot|github-co[p]ilot|gh co[p]ilot" README.md CONTRIBUTING.md TESTING.md docs scripts templates .claude/agents; then
        echo "Found legacy platform references after Claude Code conversion"
        exit 1
      fi
      echo "No Copilot-specific references found"
